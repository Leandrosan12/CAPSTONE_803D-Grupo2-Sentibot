{% load static %}
<title>Dashboard Emociones</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin: 20px;
    text-align: center;
  }

  .camara-container {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 20px auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  }

  .camara-container img {
    width: 100%;
    display: block;
  }

  .estado {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 8px 0;
    font-weight: bold;
  }

  button#startBtn {
    background-color: #7ED321;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    margin: 15px 0;
  }

  button#startBtn:hover {
    background-color: #66c10c;
  }

  #usuario {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
  }

  .report-container {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .report-box {
    background-color: #9b5f5f;
    color: white;
    padding: 15px;
    border-radius: 10px;
    flex: 1 1 200px;
    min-width: 200px;
  }

  .report-box h3 {
    margin-top: 0;
  }

  .foto-box img {
    width: 200px;
    height: 200px;
    border-radius: 12px;
    object-fit: cover;
  }
</style>
</head>
<body>

<h2>Inicio</h2>

<div class="camara-container">
  <img src="{% static 'img/prueba.jpg' %}" alt="" class="">
  <div class="estado">Apagado</div>
</div>

<button id="startBtn">Iniciar</button>

<div id="usuario">Hombre Completo</div>

<div class="report-container" id="reportContainer">
  <div class="report-box">
    <h3>Reporte actual</h3>
    <p>Feliz: 5 seg</p>
    <p>Triste: 1 seg</p>
    <p>Neutral: 1 min</p>
    <p>Null: 3 seg</p>
  </div>
  <div class="foto-box">
    <img src="{% static 'img/prueba.jpg' %}" alt="icono Sentibot" class="icono">
  </div>
  <div class="report-box">
    <h3>Informe básico</h3>
    <p>Estado: Neutral</p>
    <p>Porcentaje: 76%</p>
    <p>Estado del rostro: Detectado</p>
    <p>Id: 001</p>
  </div>
</div>

<script>
  const startBtn = document.getElementById('startBtn');
  const reportContainer = document.getElementById('reportContainer');
  const estado = document.querySelector('.estado');

  startBtn.addEventListener('click', () => {
    // Mostrar sección de reportes
    reportContainer.style.display = 'flex';
    estado.textContent = 'Iniciado';
  });
</script>

</body>
</html>
