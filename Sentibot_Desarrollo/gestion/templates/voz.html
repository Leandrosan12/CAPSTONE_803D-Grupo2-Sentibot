{% extends "base.html" %}

{% block title %}{% endblock %}

{% block content %}
<title>Reconocimiento de Voz con Barra</title>
<style>
body { 
  font-family: Arial, sans-serif; 
  margin: 50px; 
}

#texto { 
  border: 1px solid #ccc; 
  padding: 10px; 
  width: 100%; 
  min-height: 100px; 
}

#barra { 
  width: 100%; 
  height: 20px; 
  background: #eee; 
  margin-top: 10px; 
  border-radius: 5px; 
  position: relative; /* necesario para colocar la línea roja */
}

#nivel { 
  height: 100%; 
  width: 0; 
  background: #4caf50; 
  transition: width 0.05s;
}

#limite { 
  position: absolute; 
  left: 40%;      /* posición del límite de voz */
  top: 0; 
  height: 100%; 
  width: 2px;     /* grosor de la línea roja */
  background: red; 
}

button { 
  padding: 10px 20px; 
  margin-top: 10px; 
  margin-right: 10px; 
}
</style>
</head>
<body>

<h2>Reconocimiento de Voz a Texto con Barra</h2>
<div id="texto" contenteditable="true">Aquí aparecerá lo que digas...</div>


<div id="barra">
  <div id="nivel"></div>
  <div id="limite"></div> 
</div>


<button id="startBtn">Iniciar</button>
<button id="stopBtn">Detener</button>


<script>
  // Verificar compatibilidad
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition || !navigator.mediaDevices) {
    alert("Tu navegador no soporta reconocimiento de voz o micrófono.");
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.interimResults = true;
    recognition.continuous = true;

    const textoDiv = document.getElementById('texto');
    let audioContext, analyser, microphone, dataArray;

    recognition.addEventListener('result', (event) => {
      let transcript = '';
      for (const result of event.results) {
        transcript += result[0].transcript;
      }
      textoDiv.textContent = transcript;
    });

    recognition.addEventListener('end', () => {
      console.log("Reconocimiento detenido");
    });

    document.getElementById('startBtn').addEventListener('click', async () => {
      recognition.start();

      // Configurar barra de voz
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      microphone = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);
      microphone.connect(analyser);

      // Animación barra
      function animate() {
        requestAnimationFrame(animate);
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a,b) => a+b, 0);
        let average = sum / dataArray.length;
        document.getElementById('nivel').style.width = Math.min(100, average) + '%';
      }
      animate();
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      recognition.stop();
      if (microphone) microphone.disconnect();
      if (audioContext) audioContext.close();
      document.getElementById('nivel').style.width = '0%';
    });
  }
</script>

</body>
{% endblock %}
