{% load static %}
<title>Prueba Emociones</title>
<style>
  body { font-family: Arial; text-align:center; margin:20px; }
  video { width: 400px; border: 2px solid #333; border-radius:8px; }
  button { padding:10px 20px; font-size:16px; margin-top:10px; cursor:pointer; }
  #estado { margin-top:15px; font-size:18px; font-weight:bold; }
</style>
<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>
<body>

<h2>Prueba Emociones</h2>

<video id="videoCamara" autoplay playsinline></video>
<br>
<button id="startBtn">Iniciar cámara</button>
<p id="estado">Estado: ---</p>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById('videoCamara');
  const btn = document.getElementById('startBtn');
  const estadoEl = document.getElementById('estado');

  let camOn = false;
  let stream;
  let detectarInterval;

  // Cargar modelos
  async function cargarModelos() {
    await faceapi.nets.tinyFaceDetector.loadFromUri("{% static 'models/face-api.js-master' %}");
    await faceapi.nets.faceExpressionNet.loadFromUri("{% static 'models/face-api.js-master' %}");


    console.log("Modelos cargados");
  }

  async function detectarEmociones() {
    if(!video.videoWidth) return;

    const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                               .withFaceExpressions();
    if(det){
      const exp = det.expressions;
      const principales = ['happy','sad','angry','surprised','neutral'];
      let maxE = 'neutral';
      let maxV = 0;
      principales.forEach(e => { if(exp[e] > maxV){ maxV = exp[e]; maxE = e; } });
      estadoEl.textContent = `Estado: ${maxE} (${Math.round(maxV*100)}%)`;
    } else estadoEl.textContent = "Estado: No detectado";
  }

  btn.addEventListener('click', async () => {
    if(!camOn){
      await cargarModelos(); // espera a que los modelos carguen
      try{
        stream = await navigator.mediaDevices.getUserMedia({ video:true });
        video.srcObject = stream;
        camOn = true;
        btn.textContent = "Apagar cámara";
        detectarInterval = setInterval(detectarEmociones, 1000);
      } catch(e){
        alert("No se pudo acceder a la cámara. Usa localhost o HTTPS.");
        console.error(e);
      }
    } else {
      stream.getTracks().forEach(t => t.stop());
      video.srcObject = null;
      camOn = false;
      btn.textContent = "Iniciar cámara";
      clearInterval(detectarInterval);
      estadoEl.textContent = "Estado: ---";
    }
  });
});
</script>

</body>
